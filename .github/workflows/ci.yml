name: CI

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plugin-linux:
    name: Build Endcord
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build libssl-dev

      - name: Bootstrap local libc++ toolchain
        run: ./scripts/setup-local-libcxx.sh

      - name: Configure
        run: cmake --preset linux-clang-local-libcxx

      - name: Build
        run: cmake --build --preset build-local -j4

      - name: Run tests
        run: ctest --test-dir build-local --output-on-failure

      - name: Verify artifact
        run: test -f build-local/endstone_endcord.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: endstone-endcord-linux
          path: |
            build-local/endstone_endcord.so
            config/config.json.example
            config/config.schema.json
