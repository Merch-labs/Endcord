name: CI

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plugin-linux:
    name: Build Endcord
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Debian 12 compatible plugin
        run: ./scripts/build-plugin-debian12.sh

      - name: Run tests in Debian 12 container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            endcord-build:debian12 \
            bash -lc 'ctest --test-dir build-debian12 --output-on-failure'

      - name: Verify artifact
        run: test -f build-debian12/endstone_endcord.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: endstone-endcord-linux
          path: |
            build-debian12/endstone_endcord.so
            config/config.json.example
            config/config.schema.json
